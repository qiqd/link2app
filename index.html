<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h4>Authentication successful, redirecting to the app</h4>
    </div>
  </body>
  <script>
    ;(function () {
      let code = new URLSearchParams(window.location.search).get("code")
      setTimeout(function () {
        // 尝试打开链接
        window.location.href = "holo://auth/callback?code=" + code
      }, 1000)
    })()
  </script>
</html>
